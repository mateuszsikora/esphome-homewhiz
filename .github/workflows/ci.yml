name: CI

on:
  push:
  pull_request:

env:
  # The component is pinned to this ESPHome release (see README): its low-level
  # BLE GATT accessors drift across versions. Test against exactly that version.
  ESPHOME_VERSION: "2025.3.1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # These jobs only read the repo; don't leave the token in git config.
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install provisioning deps
        run: pip install aiohttp dacite python-dotenv pytest

      - name: Provisioning tests
        working-directory: provisioning
        run: python -m pytest -q

      - name: Host decode test (C++)
        run: bash tests/run.sh

      - name: ESPHome config check (all fixtures)
        run: |
          pip install "esphome==${ESPHOME_VERSION}"
          cp esphome/secrets.yaml.example esphome/secrets.yaml
          # Validate the generator + bridge.yaml against every appliance-shape
          # fixture (washer/dryer/dishwasher/oven), not just the washer — catches
          # generator regressions on field layouts the washer doesn't exercise.
          # All fixtures are public config dumps; no credentials. Validate them
          # all before failing, so one bad shape doesn't mask the others.
          rc=0
          for f in provisioning/tests/fixtures/*.json; do
            echo "::group::$(basename "$f")"
            # Guard the generator too (the step runs under `set -e`): on a
            # generator regression, record the failure, close the group, and move
            # on — otherwise the whole loop aborts and the remaining fixtures go
            # unchecked, and `esphome config` would run against a stale mapping.h.
            python provisioning/generate_mapping.py "$f" \
              --out esphome/components/homewhiz/mapping.h \
              --entities-out esphome/homewhiz_entities.yaml \
              || { rc=1; echo "::endgroup::"; continue; }
            esphome config esphome/bridge.yaml || rc=1
            echo "::endgroup::"
          done
          exit $rc

  compile:
    # `esphome config` only validates the schema — it never runs codegen, so a
    # to_code() bug (e.g. the binary_sensor import shadowing fixed in #7) or a C++
    # error compiles fine in CI's eyes and only blows up at `esphome run`. Actually
    # building the firmware against the pinned ESPHome catches both, no hardware
    # needed. Runs in parallel with `test` so the fast checks stay fast.
    runs-on: ubuntu-latest
    # A cold build is ~3 min; bound it so a hung toolchain download can't sit on
    # GitHub's 6-hour default.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # These jobs only read the repo; don't leave the token in git config.
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO / esp-idf toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-esphome-${{ env.ESPHOME_VERSION }}-${{ hashFiles('esphome/bridge.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pio-esphome-${{ env.ESPHOME_VERSION }}-

      - name: Install ESPHome + generator dep
        run: pip install "esphome==${ESPHOME_VERSION}" dacite

      # Only the washer shape is compiled here: a full build is slow, and the
      # other fixtures (dryer/dishwasher/oven) are already schema-checked by the
      # `test` job. One shape is enough to catch codegen / C++ regressions.
      - name: Generate artifacts (washer fixture)
        run: |
          python provisioning/generate_mapping.py \
            provisioning/tests/fixtures/example_washing_machine_config.json \
            --out esphome/components/homewhiz/mapping.h \
            --entities-out esphome/homewhiz_entities.yaml
          cp esphome/secrets.yaml.example esphome/secrets.yaml

      - name: Compile firmware
        run: esphome compile esphome/bridge.yaml
